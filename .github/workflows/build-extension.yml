name: Build Rancher Extension

on:
  push:
    branches: [main]
    paths:
      - 'rancher-extension/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install yarn
        run: npm install -g yarn
          
      - name: Install dependencies
        working-directory: rancher-extension
        run: yarn install
          
      - name: Build extension
        working-directory: rancher-extension
        run: yarn build-pkg ovh-autoscaler
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ovh-autoscaler-extension
          path: rancher-extension/dist-pkg/
