name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Run checks
        run: npm run check

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ui-driver-ovh-dist
          path: dist/
